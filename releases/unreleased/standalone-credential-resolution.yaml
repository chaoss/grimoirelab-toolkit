title: 'Add CredentialManager base class with resolve_credentials()'
category: added
author: Alberto Ferrer Sánchez <alberefe@gmail.com>
issue:
notes: >
    Add CredentialManager that defines the interface for all credential
    manager implementations. It provides a resolve_credentials() Template
    Method that orchestrates the login, secret fetching, field extraction,
    and logout lifecycle in a single call.
